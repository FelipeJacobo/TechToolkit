name: CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # 1. API Backend — build + test + lint
  # ─────────────────────────────────────────────
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/api

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./apps/api

      - name: Build
        run: npm run build
        working-directory: ./apps/api

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: ./apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NATS_SERVERS: nats://localhost:4222
          JWT_SECRET: test-jwt-secret
          OPENAI_API_KEY: sk-fake-key
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: apps/api/tests/e2e-report.log
          retention-days: 30

  # ─────────────────────────────────────────────
  # 2. Agent Core — build + lint
  # ─────────────────────────────────────────────
  agent-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # 3. Web Frontend — build + lint
  # ─────────────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/web

      - name: Lint
        run: npm run lint
        working-directory: ./apps/web

      - name: Build
        run: npm run build
        working-directory: ./apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8081
          NEXT_PUBLIC_WS_URL: ws://localhost:8081

  # ─────────────────────────────────────────────
  # 4. VS Code Extension — build + package
  # ─────────────────────────────────────────────
  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./vscode-extension

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./vscode-extension

      - name: Build
        run: npm run build
        working-directory: ./vscode-extension

      - name: Package extension (on main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx vsce package --no-dependencies
        working-directory: ./vscode-extension

      - name: Upload VSIX artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: aiclew-dev-assistant.vsix
          path: vscode-extension/*.vsix
          retention-days: 90

  # ─────────────────────────────────────────────
  # 5. Docker build (on push to main)
  # ─────────────────────────────────────────────
  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [api, agent-core, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          load: true
          tags: aidev-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: false
          load: true
          tags: aidev-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent Core image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.agent
          push: false
          load: true
          tags: aidev-agent-core:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run docker compose health check
        run: |
          POSTGRES_PASSWORD=test_secret docker compose up -d postgres redis nats
          docker compose up -d --wait api web agent-core
          # Health check: API responds
          sleep 5
          curl -f http://localhost:8081/health || exit 1
          docker compose logs
        env:
          POSTGRES_PASSWORD: test_secret
          JWT_SECRET: test-jwt
          REDIS_PASSWORD: test_redis
          OPENAI_API_KEY: sk-fake-key

  # ─────────────────────────────────────────────
  # 6. Security scanning (always)
  # ─────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install API dependencies
        run: npm ci
        working-directory: ./apps/api

      - name: Run npm audit (API)
        run: npm audit --audit-level=high
        working-directory: ./apps/api
        continue-on-error: true

      - name: Run npm audit (root / agent core)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Trivy config scan (docker-compose / IaC)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
