version: "3.9"
services:
  api:
    image: ai-dev-assistant-api:latest
    environment:
      - API_PORT=8081
      - DATABASE_URL=${DATABASE_URL}
      - NATS_SERVERS=${NATS_SERVERS}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - nats
      - db
  web:
    image: ai-dev-assistant-web:latest
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    depends_on:
      - api
  agent-core:
    image: ai-dev-agent-core:latest
    environment:
      - BUS_DRIVER=nats
      - NATS_SERVERS=${NATS_SERVERS}
      - DATABASE_URL=${DATABASE_URL}
      - MEMORY_DRIVER=vector
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - nats
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
  nats:
    image: nats:2.10
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
  redis:
    image: redis:7

  otel-collector:
    image: otel/opentelemetry-collector:0.99.0
    volumes:
      - ./observability/otel-collector.yml:/etc/otel-collector.yml
    command: ["--config=/etc/otel-collector.yml"]
    ports:
      - "9464:9464"

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"

volumes:
  db-data:
