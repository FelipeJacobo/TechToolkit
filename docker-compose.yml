# docker-compose.yml — AI Dev Assistant V4 (producción)
# docker compose up -d

services:
  # ─────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_dev_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_dev_app -d ai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aidev
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aidev
    deploy:
      resources:
        limits:
          memory: 256M

  nats:
    image: nats:2.10-alpine
    command: -js -m 8222
    ports:
      - "4222:4222"  # Client
      - "8222:8222"  # Monitoring
    volumes:
      - nats_data:/var/lib/nats
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aidev
    deploy:
      resources:
        limits:
          memory: 512M

  # ─────────────────────────────────────────────────────
  # Application
  # ─────────────────────────────────────────────────────

  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/Dockerfile.api
    ports:
      - "8081:8081"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ai_dev_app:${POSTGRES_PASSWORD:-change_me}@postgres:5432/ai_dev
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me}@redis:6379
      NATS_SERVERS: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-${JWT_SECRET}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANALYSIS_MODEL: ${ANALYSIS_MODEL:-gpt-4o}
      PORT: "8081"
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "60"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - aidev
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
      NEXT_PUBLIC_WS_URL: http://localhost:8081
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aidev
    deploy:
      resources:
        limits:
          memory: 1G

  agent-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ai_dev_app:${POSTGRES_PASSWORD:-change_me}@postgres:5432/ai_dev
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me}@redis:6379
      NATS_SERVERS: nats://nats:4222
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PORT: "8080"
      ANALYSIS_MODEL: ${ANALYSIS_MODEL:-gpt-4o}
      AGENT_MODEL: ${AGENT_MODEL:-gpt-4o}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aidev
    deploy:
      resources:
        limits:
          memory: 512M

# ─────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────
volumes:
  pg_data:
  redis_data:
  nats_data:

# ─────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────
networks:
  aidev:
    driver: bridge
