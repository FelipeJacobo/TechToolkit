global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "agent-core"
    static_configs:
      - targets: ["agent-core:8080"]
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:9464"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
